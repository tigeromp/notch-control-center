name: Bug report
about: Something isn't working
title: "[Bug] "
labels: bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 14.5
  - type: input
    id: mac
    attributes:
      label: Mac model
      placeholder: e.g. MacBook Air M2
